<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ほっこり自動生成 — つなぐ珈琲</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1A4731;
    --green-mid: #2E7D52;
    --green-light: #E8F5EE;
    --amber: #C17F24;
    --amber-light: #FDF3E3;
    --cream: #F7F3EE;
    --border: #C8BFA0;
    --text: #1a1a1a;
    --gray: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  header { background: var(--green); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header .title { font-family: 'Zen Old Mincho', serif; color: white; font-size: 15px; letter-spacing: 0.12em; }
  header .sub { font-size: 10px; color: var(--amber); letter-spacing: 0.1em; margin-top: 2px; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

  /* セクション共通 */
  .section { background: white; border: 1px solid var(--border); border-radius: 3px; margin-bottom: 18px; overflow: hidden; }
  .section-header { background: var(--green); padding: 11px 18px; display: flex; align-items: center; justify-content: space-between; }
  .section-header h2 { font-family: 'Zen Old Mincho', serif; font-size: 12px; color: white; font-weight: 400; letter-spacing: 0.1em; }
  .section-body { padding: 16px; }

  /* エピソード */
  .episodes-list { display: flex; flex-direction: column; gap: 8px; }
  .episode-card { border: 1px solid #E0D8CC; border-radius: 3px; padding: 11px 14px 11px 12px; background: var(--cream); cursor: pointer; transition: border-color 0.2s; display: flex; gap: 10px; align-items: flex-start; }
  .episode-card:hover { border-color: var(--green-mid); }
  .episode-card.selected { border-color: var(--green); background: var(--green-light); }
  .ep-check { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 2px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: white; background: white; transition: all 0.2s; }
  .episode-card.selected .ep-check { background: var(--green); border-color: var(--green); }
  .ep-content { flex: 1; }
  .ep-meta { display: flex; gap: 10px; margin-bottom: 4px; }
  .ep-store { font-size: 10px; color: var(--amber); letter-spacing: 0.08em; font-family: 'Zen Old Mincho', serif; }
  .ep-date { font-size: 10px; color: var(--gray); }
  .ep-text { font-family: 'Zen Old Mincho', serif; font-size: 12px; line-height: 1.85; color: var(--text); }

  /* 写真アップロード */
  .photo-upload-area { border: 2px dashed var(--border); border-radius: 4px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .photo-upload-area:hover { border-color: var(--green-mid); background: var(--green-light); }
  .photo-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-text { font-family: 'Zen Old Mincho', serif; font-size: 12px; color: var(--gray); letter-spacing: 0.06em; }
  .upload-sub { font-size: 10px; color: #bbb; margin-top: 4px; }

  .photo-preview-wrap { position: relative; }
  .photo-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 3px; display: block; }
  .photo-remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* テキストスタイル設定 */
  .style-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .style-label { font-size: 11px; color: var(--gray); min-width: 60px; }
  .style-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .style-btn { padding: 5px 12px; border: 1px solid var(--border); background: white; font-family: 'Zen Old Mincho', serif; font-size: 11px; cursor: pointer; color: var(--gray); transition: all 0.15s; border-radius: 2px; }
  .style-btn.active { background: var(--green); color: white; border-color: var(--green); }

  /* 生成ボタン */
  .generate-area { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
  .btn { padding: 11px 22px; border: none; cursor: pointer; font-family: 'Zen Old Mincho', serif; font-size: 12px; letter-spacing: 0.1em; transition: all 0.2s; }
  .btn-instagram { background: var(--amber); color: white; }
  .btn-instagram:hover { background: #a36a1a; }
  .btn-newspaper { background: var(--green); color: white; }
  .btn-newspaper:hover { background: #122e21; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .hint { font-size: 11px; color: var(--gray); font-family: 'Zen Old Mincho', serif; }

  /* 出力 */
  .output-section { display: none; }
  .output-section.visible { display: block; }
  .output-tabs { display: flex; }
  .tab { padding: 9px 20px; font-family: 'Zen Old Mincho', serif; font-size: 11px; letter-spacing: 0.08em; cursor: pointer; border: 1px solid var(--border); background: #eee; color: var(--gray); transition: all 0.2s; }
  .tab.active { background: white; color: var(--green); border-bottom-color: white; font-weight: 700; }
  .output-content { background: white; border: 1px solid var(--border); border-top: none; padding: 22px; }

  .loading { display: flex; align-items: center; gap: 10px; padding: 16px 0; color: var(--gray); font-size: 12px; font-family: 'Zen Old Mincho', serif; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--green-light); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Instagram出力 */
  .insta-output { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }

  /* カードプレビュー（正方形） */
  .insta-card-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    flex-shrink: 0;
    overflow: hidden;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--cream);
  }
  .card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
  }
  .card-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 18px 16px;
  }
  /* オーバーレイのスタイルバリエーション */
  .overlay-dark .card-overlay { background: rgba(0,0,0,0.42); }
  .overlay-green .card-overlay { background: rgba(26,71,49,0.68); }
  .overlay-bottom .card-overlay { background: linear-gradient(to top, rgba(0,0,0,0.75) 50%, transparent 100%); }
  .overlay-none .card-overlay { background: transparent; }

  /* テキストカラーバリエーション */
  .text-white .c-brand, .text-white .c-tag, .text-white .c-ep, .text-white .c-store { color: white; }
  .text-white .c-rule { background: rgba(193,127,36,0.8); }
  .text-white .c-amber-line { background: rgba(193,127,36,0.8); }
  .text-cream .c-brand, .text-cream .c-tag, .text-cream .c-ep, .text-cream .c-store { color: #f0ebe3; }
  .text-cream .c-rule { background: rgba(193,127,36,0.6); }
  .text-cream .c-amber-line { background: var(--amber); }

  /* カード内テキスト */
  .c-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .c-brand { font-family: 'Zen Old Mincho', serif; font-size: 9px; letter-spacing: 0.14em; }
  .c-tag { font-family: 'Zen Old Mincho', serif; font-size: 8.5px; letter-spacing: 0.1em; }
  .c-rule { height: 0.5px; background: var(--border); margin-bottom: 10px; }
  .c-ep { font-family: 'Zen Old Mincho', serif; font-size: 11px; line-height: 2.1; letter-spacing: 0.04em; flex: 1; }
  .c-foot { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px; }
  .c-store { font-family: 'Zen Old Mincho', serif; font-size: 7.5px; letter-spacing: 0.06em; opacity: 0.8; }
  .c-amber-line { width: 16px; height: 1.5px; background: var(--amber); }

  /* 写真なし時のカード */
  .no-photo .card-overlay { background: var(--cream); }
  .no-photo .c-brand { color: var(--green); }
  .no-photo .c-tag { color: var(--amber); }
  .no-photo .c-ep { color: var(--text); }
  .no-photo .c-store { color: var(--gray); }
  .no-photo .c-rule { background: var(--border); }

  /* 右側のコントロール */
  .insta-controls { flex: 1; min-width: 200px; }
  .ctrl-section { margin-bottom: 14px; }
  .ctrl-title { font-size: 11px; color: var(--green); font-family: 'Zen Old Mincho', serif; letter-spacing: 0.06em; margin-bottom: 6px; border-bottom: 0.5px solid var(--border); padding-bottom: 4px; }

  .caption-box { background: var(--cream); border: 1px solid var(--border); padding: 11px 13px; font-size: 11.5px; line-height: 1.9; color: var(--text); white-space: pre-wrap; font-family: 'Zen Old Mincho', serif; letter-spacing: 0.03em; min-height: 80px; }

  .copy-btn { margin-top: 8px; padding: 7px 14px; background: var(--green-light); border: 1px solid var(--green-mid); color: var(--green); font-size: 10px; cursor: pointer; font-family: 'Zen Old Mincho', serif; letter-spacing: 0.06em; transition: all 0.2s; display: inline-block; }
  .copy-btn:hover { background: var(--green); color: white; }

  /* 新聞出力 */
  .newspaper { font-family: 'Zen Old Mincho', serif; border: 1px solid var(--border); background: var(--cream); padding: 22px 22px 26px; }
  .np-header { text-align: center; border-bottom: 2.5px solid var(--green); padding-bottom: 8px; margin-bottom: 5px; }
  .np-title { font-size: 20px; font-weight: 700; color: var(--green); letter-spacing: 0.18em; }
  .np-sub { font-size: 9px; color: var(--gray); letter-spacing: 0.1em; margin-top: 2px; }
  .np-meta { display: flex; justify-content: space-between; font-size: 9px; color: #aaa; border-bottom: 0.5px solid var(--border); padding-bottom: 5px; margin-bottom: 12px; letter-spacing: 0.06em; }
  .np-main { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
  .np-label { font-size: 8px; color: var(--amber); letter-spacing: 0.14em; margin-bottom: 4px; }
  .np-main-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.7; margin-bottom: 8px; }
  .np-rule { width: 18px; height: 1.5px; background: var(--amber); margin-bottom: 8px; }
  .np-body { font-size: 11px; line-height: 2.1; color: var(--text); }
  .np-store-note { font-size: 8px; color: var(--gray); margin-top: 5px; }
  .np-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-bottom: 0.5px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
  .np-col { padding: 0 12px; border-right: 0.5px solid var(--border); }
  .np-col:first-child { padding-left: 0; }
  .np-col:last-child { border-right: none; padding-right: 0; }
  .np-col-title { font-size: 11px; font-weight: 700; color: var(--green); line-height: 1.6; margin-bottom: 5px; }
  .np-col-body { font-size: 10px; line-height: 2.0; color: var(--text); }
  .np-col-store { font-size: 8px; color: #aaa; margin-top: 4px; }
  .np-footer { display: flex; justify-content: space-between; border-top: 1px solid var(--green); padding-top: 7px; font-size: 9px; color: var(--gray); }
</style>
</head>
<body>

<header>
  <div>
    <div class="title">ほっこり自動生成システム</div>
    <div class="sub">brew_diary → Instagram / ほっこり通信</div>
  </div>
</header>

<div class="container">

  <!-- エピソード選択 -->
  <div class="section">
    <div class="section-header">
      <h2>① エピソードを選ぶ</h2>
      <span style="font-size:10px;color:var(--amber);letter-spacing:0.06em;" id="selectCount">0件選択中</span>
    </div>
    <div class="section-body">
      <div class="episodes-list" id="episodesList"></div>
    </div>
  </div>

  <!-- 写真アップロード（Instagram用） -->
  <div class="section">
    <div class="section-header">
      <h2>② 写真を選ぶ（Instagram用・任意）</h2>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.06em;">なくても生成できます</span>
    </div>
    <div class="section-body">
      <div id="uploadArea" class="photo-upload-area">
        <input type="file" accept="image/*" onchange="handlePhoto(event)">
        <div class="upload-icon">📷</div>
        <div class="upload-text">写真をタップして選択</div>
        <div class="upload-sub">JPG / PNG / HEIC</div>
      </div>
      <div id="photoPreview" style="display:none">
        <div class="photo-preview-wrap">
          <img id="previewImg" class="photo-preview">
          <button class="photo-remove" onclick="removePhoto()">✕</button>
        </div>
        <!-- オーバーレイスタイル -->
        <div style="margin-top:12px;">
          <div class="style-row">
            <span class="style-label">オーバーレイ</span>
            <div class="style-options" id="overlayOptions">
              <button class="style-btn active" onclick="setStyle('overlay','dark',this)">暗め</button>
              <button class="style-btn" onclick="setStyle('overlay','green',this)">グリーン</button>
              <button class="style-btn" onclick="setStyle('overlay','bottom',this)">下から</button>
              <button class="style-btn" onclick="setStyle('overlay','none',this)">なし</button>
            </div>
          </div>
          <div class="style-row">
            <span class="style-label">文字色</span>
            <div class="style-options" id="textOptions">
              <button class="style-btn active" onclick="setStyle('text','white',this)">白</button>
              <button class="style-btn" onclick="setStyle('text','cream',this)">クリーム</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <div class="generate-area">
    <button class="btn btn-instagram" id="btnInsta" onclick="generate('instagram')" disabled>📷 Instagram投稿を生成</button>
    <button class="btn btn-newspaper" id="btnNews" onclick="generate('newspaper')" disabled>📰 ほっこり通信を生成</button>
    <span class="hint" id="hintText">エピソードを選択してください</span>
  </div>

  <!-- 出力 -->
  <div class="output-section" id="outputSection">
    <div class="output-tabs">
      <div class="tab active" id="tabInsta" onclick="switchTab('instagram')">Instagram</div>
      <div class="tab" id="tabNews" onclick="switchTab('newspaper')">ほっこり通信</div>
    </div>
    <div class="output-content">
      <div id="loadingArea" class="loading" style="display:none">
        <div class="spinner"></div>
        <span id="loadingText">AIが書き換えています...</span>
      </div>
      <div id="instagramOutput" style="display:none"></div>
      <div id="newspaperOutput" style="display:none"></div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://ddzqgbinmmqboucxdhog.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkenFnYmlubW1xYm91Y3hkaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODg4NTYsImV4cCI6MjA5MDI2NDg1Nn0.13_Uq-NCLMeXtM96VLixwrlSPIeuU9jzDW0lYfWN8RE';

let EPISODES = [];
let selectedIds = new Set();
let photoDataUrl = null;
let overlayStyle = 'dark';
let textStyle = 'white';
let generatedCard = '';
let generatedCaption = '';

function renderEpisodes() {
  document.getElementById('episodesList').innerHTML = EPISODES.map(ep => `
    <div class="episode-card ${selectedIds.has(ep.id)?'selected':''}" onclick="toggleEp(${ep.id})">
      <div class="ep-check">${selectedIds.has(ep.id)?'✓':''}</div>
      <div class="ep-content">
        <div class="ep-meta">
          <span class="ep-store">${ep.store}</span>
          <span class="ep-date">${ep.date}</span>
        </div>
        <div class="ep-text">${ep.text}</div>
      </div>
    </div>
  `).join('');
}

function toggleEp(id) {
  selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
  updateUI();
  renderEpisodes();
}

function updateUI() {
  const n = selectedIds.size;
  document.getElementById('selectCount').textContent = `${n}件選択中`;
  document.getElementById('btnInsta').disabled = n === 0;
  document.getElementById('btnNews').disabled = n < 2;
  document.getElementById('hintText').textContent =
    n === 0 ? 'エピソードを選択してください' :
    n === 1 ? 'Instagram投稿を生成できます（通信は2件以上）' :
    'Instagram投稿・ほっこり通信を生成できます';
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoDataUrl = ev.target.result;
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('photoPreview').style.display = 'block';
    document.getElementById('previewImg').src = photoDataUrl;
    if (generatedCard) updateCardPreview();
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  photoDataUrl = null;
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('photoPreview').style.display = 'none';
  if (generatedCard) updateCardPreview();
}

function setStyle(type, val, btn) {
  if (type === 'overlay') {
    overlayStyle = val;
    document.querySelectorAll('#overlayOptions .style-btn').forEach(b => b.classList.remove('active'));
  } else {
    textStyle = val;
    document.querySelectorAll('#textOptions .style-btn').forEach(b => b.classList.remove('active'));
  }
  btn.classList.add('active');
  if (generatedCard) updateCardPreview();
}

function updateCardPreview() {
  const wrap = document.getElementById('cardWrap');
  if (!wrap) return;
  wrap.className = 'insta-card-wrap';
  if (photoDataUrl) {
    document.getElementById('cardBg').style.backgroundImage = `url(${photoDataUrl})`;
    wrap.classList.add(`overlay-${overlayStyle}`, `text-${textStyle}`);
  } else {
    document.getElementById('cardBg').style.backgroundImage = '';
    wrap.classList.add('no-photo');
  }
}

function switchTab(tab) {
  document.getElementById('tabInsta').className = 'tab'+(tab==='instagram'?' active':'');
  document.getElementById('tabNews').className = 'tab'+(tab==='newspaper'?' active':'');
  document.getElementById('instagramOutput').style.display = tab==='instagram'?'block':'none';
  document.getElementById('newspaperOutput').style.display = tab==='newspaper'?'block':'none';
}


async function fetchWithRetry(url, options, retries=3) {
  for (let i=0; i<retries; i++) {
    const res = await fetch(url, options);
    if (res.status === 429) {
      const wait = (i+1) * 8000;
      document.getElementById("loadingText").textContent = `制限中... ${wait/1000}秒後に再試行 (${i+1}/${retries})`;
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    return res;
  }
  throw new Error("リクエスト制限が続いています。しばらく待ってから再試行してください。");
}

async function generate(type) {
  const selected = EPISODES.filter(ep => selectedIds.has(ep.id));
  if (!selected.length) return;

  document.getElementById('outputSection').className = 'output-section visible';
  document.getElementById('loadingArea').style.display = 'flex';
  document.getElementById('instagramOutput').style.display = 'none';
  document.getElementById('newspaperOutput').style.display = 'none';
  document.getElementById('loadingText').textContent = type==='instagram' ? 'Instagram投稿を生成しています...' : 'ほっこり通信を生成しています...';
  switchTab(type);

  const ep = selected[0];

  try {
    if (type === 'instagram') {
      // 写真はAPIに送らず、テキストのみで生成
      const prompt = `あなたはつなぐ珈琲（秋田県のスペシャルティコーヒーブランド）のライターです。
以下のスタッフが書いたエピソードを、Instagram投稿用に書き換えてください。

【ルール】
- ですます調
- 個人が特定される情報（名前・性別・年齢）は絶対に入れない
- 情景が浮かぶ具体的な描写を入れる
- スタッフがどう感じたかを自然に含める
- カード用テキスト：60文字以内、\\nで2〜3回改行する
- キャプション文：180〜220文字、ハッシュタグなし、温かみのある文体
- 必ずJSON形式のみ返す。前後に説明文やマークダウン記号を入れない:
{"card": "カード用テキスト", "caption": "キャプション文"}

【エピソード】
店舗: ${ep.store} / ${ep.date}
内容: ${ep.text}`;

      const res = await fetchWithRetry('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 800,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const data = await res.json();
      if (!data.content || !data.content[0]) throw new Error('APIレスポンス異常');

      const rawText = data.content[0].text;
      const jsonMatch = rawText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('JSON取得失敗');
      const parsed = JSON.parse(jsonMatch[0]);

      generatedCard = parsed.card || '';
      generatedCaption = parsed.caption || '';
      renderInstagram(ep, generatedCard, generatedCaption);

    } else {
      const texts = selected.map((e,i) => `エピソード${i+1}（${e.store} / ${e.date}）:\n${e.text}`).join('\n\n');
      const prompt = `あなたはつなぐ珈琲（秋田県のスペシャルティコーヒーブランド）の編集者です。
以下のエピソードから「ほっこり通信」の記事を作ってください。

【ルール】
- ですます調
- 個人が特定される情報は絶対に入れない
- 情景とスタッフの感情が伝わる文体
- メイン記事：最も印象的なエピソードを130〜160文字で小説風に
- サブ記事：残りのエピソードを各55〜75文字で
- 必ずJSON形式のみ返す。前後に説明文やマークダウン記号を入れない:
{"main":{"title":"タイトル20字以内","body":"本文","store":"店舗名と日付"},"subs":[{"title":"タイトル","body":"本文","store":"店舗名と日付"}]}

【エピソード】
${texts}`;

      const res = await fetchWithRetry('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1200,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const data = await res.json();
      if (!data.content || !data.content[0]) throw new Error('APIレスポンス異常');

      const rawText = data.content[0].text;
      const jsonMatch = rawText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('JSON取得失敗');
      const parsed = JSON.parse(jsonMatch[0]);
      renderNewspaper(parsed);
    }
  } catch(e) {
    console.error(e);
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById(type==='instagram'?'instagramOutput':'newspaperOutput').style.display = 'block';
    document.getElementById(type==='instagram'?'instagramOutput':'newspaperOutput').innerHTML =
      `<div style="color:#c00;font-size:12px;padding:8px;">生成に失敗しました（${e.message}）。もう一度お試しください。</div>`;
    return;
  }

  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById(type==='instagram'?'instagramOutput':'newspaperOutput').style.display = 'block';
}

function setStyleAndUpdate(type, val, btn) {
  if (type === 'overlay') {
    overlayStyle = val;
    document.querySelectorAll('.style-btn').forEach(b => { if (['暗め','グリーン','下から','なし'].some(l=>b.textContent===l)) b.classList.remove('active'); });
  } else {
    textStyle = val;
    document.querySelectorAll('.style-btn').forEach(b => { if (['白','クリーム'].some(l=>b.textContent===l)) b.classList.remove('active'); });
  }
  btn.classList.add('active');
  updateCardPreview();
}

function renderNewspaper(data) {
  const today = new Date();
  const subCols = (data.subs || []).slice(0,3).map(s=>`
    <div class="np-col">
      <div class="np-col-title">${s.title}</div>
      <div class="np-col-body">${s.body}</div>
      <div class="np-col-store">${s.store}</div>
    </div>
  `).join('');

  document.getElementById('newspaperOutput').innerHTML = `
    <div class="newspaper">
      <div class="np-header">
        <div class="np-title">ほっこり通信</div>
        <div class="np-sub">つなぐ珈琲 / つなぎ手たちの物語</div>
      </div>
      <div class="np-meta">
        <span>${today.getFullYear()}年${today.getMonth()+1}月</span>
        <span>大曲・秋田市・横手</span>
        <span>無料配布</span>
      </div>
      <div class="np-main">
        <div class="np-label">今週のほっこり</div>
        <div class="np-main-title">${data.main.title}</div>
        <div class="np-rule"></div>
        <div class="np-body">${data.main.body}</div>

      ${subCols ? `<div class="np-cols">${subCols}</div>` : ''}
      <div class="np-footer">
        <span>つなぐ珈琲 / ほっこり通信</span>
        <span>${today.getFullYear()}年${today.getMonth()+1}月発行</span>
      </div>
    </div>
    <button class="copy-btn" style="margin-top:12px" onclick="copyNp()">本文テキストをコピー</button>
  `;
}

function copyNp() {
  const els = document.querySelectorAll('.np-main-title, .np-body, .np-col-title, .np-col-body');
  const text = Array.from(els).map(e=>e.textContent).join('\n\n');
  navigator.clipboard.writeText(text).then(()=>alert('コピーしました！'));
}

async function loadEpisodes() {
  const list = document.getElementById('episodesList');
  list.innerHTML = '<div style="padding:16px;font-size:12px;color:#888;">読み込み中...</div>';
  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/brew_diary?order=created_at.desc&limit=20',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (!res.ok) throw new Error('取得失敗: ' + res.status);
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length === 0) {
      list.innerHTML = '<div style="padding:16px;font-size:12px;color:#888;">エピソードが見つかりませんでした</div>';
      return;
    }
    const sample = rows[0];
    console.log('カラム一覧:', Object.keys(sample));
    const textKey = ['episode', 'content', 'text', 'body', 'memo', 'note', 'description']
      .find(k => sample[k] !== undefined)
      || Object.keys(sample).find(k => typeof sample[k] === 'string' && (sample[k] || '').length > 10)
      || 'episode';
    const storeKey = ['store', 'store_name', 'shop', 'location']
      .find(k => sample[k] !== undefined) || null;
    const dateKey = ['created_at', 'date', 'recorded_at', 'timestamp']
      .find(k => sample[k] !== undefined) || 'created_at';
    const idKey = ['id', 'uuid'].find(k => sample[k] !== undefined) || 'id';

    EPISODES = rows.map(r => ({
      id: r[idKey],
      store: storeKey ? (r[storeKey] || '—') : '—',
      date: r[dateKey] ? String(r[dateKey]).slice(0, 10).replace(/-/g, '.') : '—',
      text: r[textKey] || '',
    })).filter(e => e.text.length > 0);

    renderEpisodes();
    updateUI();
  } catch(e) {
    list.innerHTML = '<div style="padding:16px;font-size:12px;color:#c00;">読み込み失敗: ' + e.message + '</div>';
    console.error(e);
  }
}

loadEpisodes();
